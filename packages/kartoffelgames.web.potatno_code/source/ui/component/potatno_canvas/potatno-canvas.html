<div #viewport class="viewport" (pointerdown)="this.onPointerDown($event)" (pointermove)="this.onPointerMove($event)" (pointerup)="this.onPointerUp($event)" (wheel)="this.onWheel($event)" (contextmenu)="this.onContextMenu($event)" (keydown)="this.onKeyDown($event)" tabindex="0">
    <div #grid class="grid" [style]="this.gridStyle">
        <svg #svgLayer class="svg-layer" xmlns="http://www.w3.org/2000/svg"></svg>
        <div class="node-layer">
            $slot
        </div>
    </div>
    $if(this.showSelectionBox) {
        <div class="selection-box" [style]="this.selectionBoxStyle"></div>
    }
</div>
